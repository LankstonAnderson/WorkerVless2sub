name: Obfuscate and Commit

on:
  push:
    branches: [main]
    paths:
      - '_worker.src.js'
      - 'obfuscator-config.json'
      - 'package.json'
  workflow_dispatch:
  workflow_run:
    workflows: ["Upstream Sync"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Obfuscate _worker.js
        run: bun run obfuscate

      - name: Check syntax
        run: node --check _worker.js

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add _worker.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(obfuscate): regenerate _worker.js from _worker.src.js"
          git push

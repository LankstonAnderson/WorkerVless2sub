name: Process SpeedTest Results

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [result.csv]

env:
  HISTORY_DAYS: 7
  HISTORY_MAX: 200

jobs:
  process:
    name: Build latest & history CSVs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CFST
        run: |
          wget -q "https://github.com/XIU2/CloudflareSpeedTest/releases/download/v${{ env.CFST_VERSION }}/cfst_linux_amd64.tar.gz"
          tar -zxf cfst_linux_amd64.tar.gz
          chmod +x cfst

      - name: 合并历史 IP
        run: |
          if [ -f history.csv ]; then
            awk -F',' '{print $1}' history.csv | tail -n 100 >> ip.txt
            echo "已合并 $(tail -n 100 history.csv | wc -l) 个历史 IP 到 ip.txt"
          else
            echo "history.csv 不存在，跳过历史 IP 合并"
          fi

      - name: Run SpeedTest
        run: |
          ./cfst -f ip.txt -o result.csv \\
            -url "https://speedtest.andersonrobotics.xx.kg" \\
            -tl 200 -tll 0 -tlr 0.2 \\
            -sl 1 -dn 10 -dt 5 \\
            -p 0 -n 500

          echo "测速完成，共 $(tail -n +2 result.csv | wc -l) 个 IP"

      - name: Process
        run: |
          [ -f result.csv ] || { echo "result.csv not found"; exit 0; }

          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          mkdir -p archive

          # latest.csv → 有速度的 IP
          awk -F',' 'NR==1 || $6+0 > 0' result.csv | tail -n +2 > latest.csv
          echo "latest: $(wc -l < latest.csv) 个有速度 IP"

          # archive → 保存有速度的结果
          cp latest.csv "archive/$TODAY.csv"

          # history.csv → 合并 7 天，按 IP 去重，最多 HISTORY_MAX 个
          ls -r archive/*.csv 2>/dev/null | head -$HISTORY_DAYS | while read f; do
            cat "$f"
          done | awk -F',' '$6+0>0 && $7!="N/A" && !seen[$1]++' | head -$HISTORY_MAX > history.csv

          # 清理过期 archive
          find archive -name "*.csv" -mtime +$HISTORY_DAYS -delete

          echo "history: $(wc -l < history.csv) 个 IP（去重后，上限 $HISTORY_MAX）"

      - name: Check JS syntax
        run: node --check _worker.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add latest.csv history.csv archive/
          git diff --cached --quiet && exit 0

          git commit -m "cfst: $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
          git push

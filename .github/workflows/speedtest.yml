name: Process SpeedTest Results

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [result.csv]

env:
  HISTORY_DAYS: 7
  HISTORY_MAX: 200

jobs:
  process:
    name: Build latest & history CSVs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process
        run: |
          [ -f result.csv ] || { echo "result.csv not found"; exit 0; }

          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          mkdir -p archive

          # latest.csv → 有速度的 IP
          awk -F',' 'NR==1 || $6+0 > 0' result.csv | tail -n +2 > latest.csv
          echo "latest: $(wc -l < latest.csv) 个有速度 IP"

          # archive → 保存有速度的结果
          cp latest.csv "archive/$TODAY.csv"

          # history.csv → 合并 7 天，按 IP 去重，最多 HISTORY_MAX 个
          echo "IP地址,已发送,已接收,丢包率,平均延迟,下载速度(MB/s),地区码" > history.csv
          ls -r archive/*.csv 2>/dev/null | head -$HISTORY_DAYS | while read f; do
            cat "$f"
          done | awk -F',' '!seen[$1]++' | head -$HISTORY_MAX >> history.csv

          # 清理过期 archive
          find archive -name "*.csv" -mtime +$HISTORY_DAYS -delete

          echo "history: $(($(wc -l < history.csv) - 1)) 个 IP（去重后，上限 $HISTORY_MAX）"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add latest.csv history.csv archive/
          git diff --cached --quiet && exit 0

          git commit -m "cfst: $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
          git push

name: CloudflareSpeedTest

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:       # 手动触发

env:
  CFST_VERSION: '2.3.5'
  HISTORY_DAYS: 7

jobs:
  speedtest:
    name: Run CFST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CFST
        run: |
          wget -q "https://github.com/XIU2/CloudflareSpeedTest/releases/download/v${{ env.CFST_VERSION }}/cfst_linux_amd64.tar.gz"
          tar -zxf cfst_linux_amd64.tar.gz
          chmod +x cfst

      - name: Run SpeedTest
        run: |
          ./cfst -f ip.txt -o result.csv \
            -tl 200 -tll 0 -tlr 0.2 \
            -dd -p 0 -n 500

          echo "测速完成，共 $(tail -n +2 result.csv | wc -l) 个 IP"

      - name: Update Files
        run: |
          TODAY=$(date +%Y-%m-%d)
          mkdir -p archive

          # 1. latest.csv → 直接用今天的结果（无表头）
          tail -n +2 result.csv > latest.csv

          # 2. 保存今日到 archive（仅用于 history 合并）
          cp result.csv "archive/$TODAY.csv"

          # 3. history.csv → 合并最近 7 天，去重
          echo "IP地址,已发送,已接收,丢包率,平均延迟,下载速度(MB/s),地区码" > history.csv
          ls -r archive/*.csv | head -$HISTORY_DAYS | while read f; do
            tail -n +2 "$f"
          done | awk -F',' '!seen[$1]++' >> history.csv

          # 4. 清理过期 archive
          find archive -name "*.csv" -mtime +$HISTORY_DAYS -delete

          echo "latest: $(wc -l < latest.csv) 行"
          echo "history: $(wc -l < history.csv) 行"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add latest.csv history.csv archive/
          git diff --cached --quiet && exit 0

          git commit -m "cfst: $(date +%Y-%m-%d)"
          git push

[custom]
; Loyalsoldier clash-rules for subconverter external config
; 用法：把本文件作为 subconverter 的 config= 远程配置使用
; 默认：类似白名单模式，未命中规则走 Final，Final 默认 PROXY

; ========================
; 策略组 / Proxy Groups
; ========================
custom_proxy_group=PROXY`select`[]AUTO`[]MANUAL`[]DIRECT`.*
custom_proxy_group=AUTO`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=MANUAL`select`.*
custom_proxy_group=Apple`select`[]DIRECT`[]PROXY`[]AUTO`[]MANUAL
custom_proxy_group=Google`select`[]PROXY`[]DIRECT`[]AUTO`[]MANUAL
custom_proxy_group=Telegram`select`[]PROXY`[]AUTO`[]MANUAL`[]DIRECT
custom_proxy_group=Final`select`[]PROXY`[]DIRECT`[]AUTO`[]MANUAL

; ========================
; 规则集 / Rulesets
; 使用 jsDelivr，国内通常比 raw.githubusercontent.com 更容易访问
; ========================

; 需要直连的常见软件列表 applications.txt / behavior: classical
ruleset=DIRECT,clash-classic:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt,86400

; Clash/Yacd 面板直连
ruleset=DIRECT,[]DOMAIN,clash.razord.top
ruleset=DIRECT,[]DOMAIN,yacd.haishan.me

; 私有网络专用域名列表 private.txt / behavior: domain
ruleset=DIRECT,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt,86400

; 广告域名列表 reject.txt / behavior: domain
ruleset=REJECT,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt,86400

; iCloud 域名列表 icloud.txt / behavior: domain
ruleset=Apple,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt,86400

; Apple 在中国大陆可直连的域名列表 apple.txt / behavior: domain
ruleset=Apple,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt,86400

; [慎用] Google 在中国大陆可直连的域名列表 google.txt / behavior: domain
; 默认走 Google 组，你可以在客户端里把 Google 组切成 DIRECT 或 PROXY
ruleset=Google,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt,86400

; 代理域名列表 proxy.txt / behavior: domain
ruleset=PROXY,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt,86400

; GFWList 域名列表 gfw.txt / behavior: domain
ruleset=PROXY,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt,86400

; 非中国大陆使用的顶级域名列表 tld-not-cn.txt / behavior: domain
ruleset=PROXY,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt,86400

; 直连域名列表 direct.txt / behavior: domain
ruleset=DIRECT,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt,86400

; 局域网 IP 及保留 IP 地址列表 lancidr.txt / behavior: ipcidr
ruleset=DIRECT,clash-ipcidr:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt,86400

; 中国大陆 IP 地址列表 cncidr.txt / behavior: ipcidr
ruleset=DIRECT,clash-ipcidr:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt,86400

; Telegram 使用的 IP 地址列表 telegramcidr.txt / behavior: ipcidr
ruleset=Telegram,clash-ipcidr:https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt,86400

; GEOIP 兜底直连
ruleset=DIRECT,[]GEOIP,LAN
ruleset=DIRECT,[]GEOIP,CN,no-resolve

; 最终规则：默认走 Final 组，Final 默认 PROXY。想改黑名单模式，就在客户端里把 Final 切成 DIRECT。
ruleset=Final,[]FINAL

; ========================
; 生成规则 / Generator
; ========================
enable_rule_generator=true
overwrite_original_rules=true
